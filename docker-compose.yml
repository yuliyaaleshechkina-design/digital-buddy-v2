version: '3.8'

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=sqlite:///data/digital_buddy.db
      - HF_TOKEN=${HF_TOKEN:-}
      - AI_GATEWAY_URL=${AI_GATEWAY_URL:-}
      - AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-4}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.7}
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
